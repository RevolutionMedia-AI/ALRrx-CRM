server {
    listen 80;
    server_name _;

    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

    root /usr/share/nginx/html;
    index index.html;

    # Serve uploaded files
    client_max_body_size 600M;

    # React SPA (ALRrx + Slice)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ALRrx API → :5000
    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    # Slice API → :5001
    # The frontend calls /api/slice/* and Vite/nginx strips the prefix.
    location /api/slice/ {
        rewrite ^/api/slice/(.*)$ /api/$1 break;
        proxy_pass http://localhost:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    # Health checks
    location /health {
        proxy_pass http://localhost:5000;
        proxy_set_header Host $host;
    }
    location /api/slice/health {
        rewrite ^/api/slice/health$ /health break;
        proxy_pass http://localhost:5001;
    }

    # SignalR (ALRrx, unused but kept for future)
    location /hubs/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
