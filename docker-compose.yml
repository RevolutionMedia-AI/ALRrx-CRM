services:
  backend:
    build:
      context: ./backend/ALRrx.Api
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Ssh__Host=${SSH_HOST}
      - Ssh__Port=${SSH_PORT:-22}
      - Ssh__Username=${SSH_USERNAME}
      - Ssh__Password=${SSH_PASSWORD}
      - Ssh__PrivateKeyPath=${SSH_PRIVATE_KEY_PATH:-/app/keys/id_rsa}
      - Ssh__PrivateKeyPassphrase=${SSH_PRIVATE_KEY_PASSPHRASE}
      - Ssh__LocalPort=${SSH_LOCAL_PORT:-3307}
      - Ssh__RemoteHost=${SSH_REMOTE_HOST:-127.0.0.1}
      - Ssh__RemotePort=${SSH_REMOTE_PORT:-3306}
      - Database__Name=${DB_NAME:-asterisk}
      - Database__User=${DB_USER}
      - Database__Password=${DB_PASSWORD}
    volumes:
      - ./keys:/app/keys:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
